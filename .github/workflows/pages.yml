name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client and seed DB
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run seed
        env:
          DATABASE_URL: file:./dev.db

      - name: Prepare static export
        run: |
          mv app/api app/_api
          mv app/admin app/_admin

      - name: Build static site
        run: npm run build
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_BASE_PATH: /mrpet-store
          NEXT_PUBLIC_SITE_URL: https://rinat3636.github.io/mrpet-store
          NEXT_PUBLIC_OZON_URL: https://ozon.ru/t/D4yNPF1
          DATABASE_URL: file:./dev.db

      - name: Create .nojekyll
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
